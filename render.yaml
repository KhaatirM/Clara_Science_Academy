services:
  - type: web
    name: csastudentmanagement
    env: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
    releaseCommand: python scripts/startup.py --migrate-only
    # 1 worker + 4 gthread threads = 4 concurrent requests within one process.
    # Keeps memory low for Render's 512MB free plan; upgrade to `--workers 2 --threads 4`
    # if you move to a paid plan with more RAM. --timeout 60 prevents Gunicorn from
    # killing requests that are slow due to a cold DB connection or PDF generation.
    startCommand: gunicorn --workers 1 --threads 4 --worker-class gthread --timeout 60 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /home
    # PERSISTENT DISK (required for assignment PDFs to survive deploys)
    # Render's filesystem is ephemeral - uploads are wiped on every deploy. Without a disk, assignment
    # documents return 404 after redeploy. Persistent disks require a PAID plan (not available on free).
    #
    # To fix 404s: 1) Upgrade to a paid plan  2) In Dashboard → service → Disks → Add disk
    #   - Name: uploads
    #   - Mount path: /opt/render/project/src/static/uploads
    #   - Size: 1 GB (increase as needed)
    # 3) Re-deploy. No UPLOAD_FOLDER env var needed - default path matches the mount.
    #
    # Alternative: Mount at /data and set env var UPLOAD_FOLDER=/data/uploads
    # disk:
    #   name: uploads
    #   mountPath: /opt/render/project/src/static/uploads
    #   sizeGB: 1
