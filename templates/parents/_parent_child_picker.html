{# Shared child selector + quick links #}
{% if children %}
<section class="pp-children">
  <p class="pp-children__label">Your children</p>
  <div class="pp-children__scroll">
    {% for child in children %}
    <form method="post" action="{{ url_for('parent.select_child', student_id=child.id) }}" class="pp-child-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <button type="submit" class="pp-child-chip {% if child.id == active_child_id %}pp-child-chip--active{% endif %}" aria-pressed="{{ 'true' if child.id == active_child_id else 'false' }}">
        <span class="pp-child-chip__avatar" aria-hidden="true">{{ child.first_name[0] }}{{ child.last_name[0] }}</span>
        <span>
          <span class="pp-child-chip__name">{{ child.first_name }} {{ child.last_name }}</span>
          <span class="pp-child-chip__grade">
            {% if child.grade_level == 0 %}Kindergarten{% elif child.grade_level is not none %}Grade {{ child.grade_level }}{% else %}Student{% endif %}
          </span>
        </span>
        <span class="pp-child-chip__active-dot" aria-hidden="true"></span>
      </button>
    </form>
    {% endfor %}
  </div>
</section>
{% endif %}
