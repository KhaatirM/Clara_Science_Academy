<link rel="stylesheet" href="{{ url_for('static', filename='css/credential_modal.css') }}">

<div class="modal fade" id="credentialSummaryModal" tabindex="-1" aria-labelledby="credentialSummaryModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content credential-summary-modal">
            <div class="modal-header credential-summary-header">
                <div>
                    <h5 class="modal-title mb-1" id="credentialSummaryModalLabel">
                        <i class="bi bi-key-fill me-2"></i><span class="csm-title">Account summary</span>
                    </h5>
                    <p class="mb-0 small opacity-90 csm-subtitle"></p>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body credential-summary-body csm-body">
            </div>
            <div class="modal-footer credential-summary-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<script>
(function () {
    function esc(s) {
        return String(s == null ? '' : s)
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function buildBodyHtml(payload) {
        var html = '';
        (payload.alerts || []).forEach(function (a) {
            var cls = 'alert-info';
            if (a.type === 'warning') cls = 'alert-warning';
            if (a.type === 'danger') cls = 'alert-danger';
            html += '<div class="alert ' + cls + ' py-2 mb-3">' + esc(a.text) + '</div>';
        });
        if (payload.fields && payload.fields.length) {
            html += '<div class="table-responsive mb-3"><table class="table table-sm csm-table mb-0"><tbody>';
            payload.fields.forEach(function (f) {
                var cell = esc(f.value);
                if (f.mono) cell = '<code>' + cell + '</code>';
                html += '<tr><th scope="row">' + esc(f.label) + '</th><td>' + cell + '</td></tr>';
            });
            html += '</tbody></table></div>';
        }
        (payload.notes || []).forEach(function (n) {
            html += '<p class="small text-muted mb-2 border-start border-3 border-secondary ps-2">' + esc(n) + '</p>';
        });
        if (!html) html = '<p class="text-muted mb-0">No details.</p>';
        return html;
    }

    function showFromPayload(payload, onHidden) {
        if (!payload) return;
        var modalEl = document.getElementById('credentialSummaryModal');
        if (!modalEl) return;
        var titleEl = modalEl.querySelector('.csm-title');
        var subEl = modalEl.querySelector('.csm-subtitle');
        var bodyEl = modalEl.querySelector('.csm-body');
        if (titleEl) titleEl.textContent = payload.title || 'Account summary';
        if (subEl) subEl.textContent = payload.subtitle || '';
        if (bodyEl) bodyEl.innerHTML = buildBodyHtml(payload);
        var modal = bootstrap.Modal.getOrCreateInstance(modalEl);
        if (typeof onHidden === 'function') {
            function handler() {
                modalEl.removeEventListener('hidden.bs.modal', handler);
                onHidden();
            }
            modalEl.addEventListener('hidden.bs.modal', handler);
        }
        modal.show();
    }

    window.CredentialModal = { showFromPayload: showFromPayload };

    document.addEventListener('DOMContentLoaded', function () {
        var seed = document.getElementById('credentialModalSeed');
        if (!seed || !seed.textContent) return;
        try {
            var p = JSON.parse(seed.textContent);
            if (p && typeof p === 'object') showFromPayload(p);
        } catch (e) { /* ignore */ }
    });
})();
</script>
